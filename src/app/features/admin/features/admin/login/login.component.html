<div class="min-h-screen bg-gradient-to-br from-primary-600 to-primary-900 flex items-center justify-center p-4">
  
  <!-- Card Login -->
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
    
    <!-- Header -->
    <div class="bg-gradient-to-r from-primary-600 to-primary-800 p-8 text-center text-white">
      <div class="text-5xl mb-3">🔐</div>
      <h1 class="text-2xl font-bold">Administration</h1>
      <p class="text-blue-200 text-sm mt-1">Portfolio Franck CALDERARA</p>
    </div>

    <!-- Form -->
    <div class="p-8">
      
      <!-- Error -->
      <div *ngIf="error"
           class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-6 flex items-center gap-2">
        <span>⚠️</span>
        <span>{{ error }}</span>
      </div>

      <!-- Username -->
      <div class="mb-4">
        <label class="block text-gray-700 font-medium mb-2">
          👤 Nom d'utilisateur
        </label>
        <input type="text"
               [(ngModel)]="username"
               (keyup.enter)="login()"
               placeholder="admin"
               class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all">
      </div>

      <!-- Password -->
      <div class="mb-6">
        <label class="block text-gray-700 font-medium mb-2">
          🔑 Mot de passe
        </label>
        <div class="relative">
          <input [type]="showPassword ? 'text' : 'password'"
                 [(ngModel)]="password"
                 (keyup.enter)="login()"
                 placeholder="••••••••"
                 class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all pr-12">
          <button (click)="showPassword = !showPassword"
                  class="absolute right-4 top-3.5 text-gray-400 hover:text-gray-600">
            {{ showPassword ? '👁️' : '🙈' }}
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button (click)="login()"
              [disabled]="loading"
              class="w-full btn-primary py-3 flex items-center justify-center gap-2 text-lg">
        <span *ngIf="!loading">🚀 Se connecter</span>
        <span *ngIf="loading" class="flex items-center gap-2">
          <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>
          Connexion...
        </span>
      </button>

      <!-- Hint -->
      <p class="text-center text-gray-400 text-sm mt-6">
        Accès réservé à l'administrateur
      </p>
    </div>
  </div>
</div>
